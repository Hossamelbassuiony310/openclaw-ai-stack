services:
  traefik:
    image: traefik:v2.10
    container_name: traefik

    environment:
      - DOCKER_API_VERSION=1.53

    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"

    ports:
      - "80:80"
      - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - openclaw-bridge

    restart: unless-stopped

networks:
  openclaw-bridge:
    external: true
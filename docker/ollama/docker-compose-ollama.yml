services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./ollama:/root/.ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - openclaw-bridge
    ports:
      - "11435:11434"

networks:
  openclaw-bridge:
    name: openclaw-bridge
    driver: bridge